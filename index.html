q5<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Tienda Express</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌱 Agro Tienda Express</h1>
    <p>Todo lo que necesitas para tu hogar, en un solo lugar.</p>
</header>

<section id="productos">
</section>

<section id="carrito">
    <h2>🛒 Mi Pedido</h2>

    <ul id="lista"></ul>

<h3 id="total">
    Total: $0.00
</h3>

<div id="datosPedido">

    <label for="casa">🏠 Casa donde se entrega:</label>
    <input 
        type="text" 
        id="casa" 
        placeholder="Ejemplo: Casa #15">

    <label for="especificaciones">📝 Especificaciones del pedido:</label>
    <textarea 
        id="especificaciones" 
        placeholder="Ejemplo: Licuado de fresa con poca azúcar y leche deslactosada"></textarea>

</div>

<button onclick="enviarPedido()">
    Enviar pedido por WhatsApp
</button>
